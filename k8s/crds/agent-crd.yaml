apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.antigravity.io
  namespace: antigravity-system
spec:
  group: antigravity.io
  scope: Namespaced
  names:
    kind: Agent
    plural: agents
    singular: agent
    shortNames:
      - ag
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - name
                - role
                - model
              properties:
                name:
                  type: string
                  description: "Name of the agent"
                  minLength: 1
                  maxLength: 255
                role:
                  type: string
                  description: "Role or purpose of the agent"
                  enum:
                    - researcher
                    - developer
                    - tester
                    - architect
                    - devops
                    - analyst
                    - custom
                model:
                  type: string
                  description: "AI model to use (mistral, neural-chat, llama2, etc.)"
                instructions:
                  type: string
                  description: "Custom instructions for the agent"
                  maxLength: 5000
                workspaceId:
                  type: string
                  description: "Associated workspace"
                replicas:
                  type: integer
                  description: "Number of agent replicas"
                  minimum: 1
                  maximum: 10
                  default: 1
                resourceRequirements:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "100m"
                        memory:
                          type: string
                          default: "128Mi"
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "500m"
                        memory:
                          type: string
                          default: "512Mi"
                scheduling:
                  type: object
                  properties:
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
                    affinity:
                      type: object
                    tolerations:
                      type: array
                autoscaling:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    minReplicas:
                      type: integer
                      minimum: 1
                      default: 1
                    maxReplicas:
                      type: integer
                      minimum: 1
                      default: 10
                    targetCPUUtilizationPercentage:
                      type: integer
                      minimum: 0
                      maximum: 100
                      default: 80
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Succeeded
                    - Failed
                    - Unknown
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                replicas:
                  type: integer
                readyReplicas:
                  type: integer
                updatedReplicas:
                  type: integer
                failedReplicas:
                  type: integer
                lastUpdateTime:
                  type: string
                  format: date-time
                stats:
                  type: object
                  properties:
                    tasksCompleted:
                      type: integer
                    tasksRunning:
                      type: integer
                    errorCount:
                      type: integer
                    uptime:
                      type: integer
      additionalPrinterColumns:
        - name: NAME
          type: string
          jsonPath: .metadata.name
        - name: ROLE
          type: string
          jsonPath: .spec.role
        - name: MODEL
          type: string
          jsonPath: .spec.model
        - name: REPLICAS
          type: integer
          jsonPath: .spec.replicas
        - name: STATUS
          type: string
          jsonPath: .status.phase
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
