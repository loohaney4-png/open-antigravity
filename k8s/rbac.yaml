apiVersion: v1
kind: Namespace
metadata:
  name: antigravity-system
  labels:
    name: antigravity-system
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: antigravity-operator
  namespace: antigravity-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: antigravity-operator
rules:
  # Agent CRD management
  - apiGroups: ["antigravity.io"]
    resources: ["agents", "agents/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Task CRD management
  - apiGroups: ["antigravity.io"]
    resources: ["tasks", "tasks/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Pod management for agent workloads
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Service management
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # ConfigMap and Secret management
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # PersistentVolumeClaim management
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Deployment and StatefulSet management
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # HPA for autoscaling
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Events for status tracking
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  
  # Logs access
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: antigravity-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: antigravity-operator
subjects:
  - kind: ServiceAccount
    name: antigravity-operator
    namespace: antigravity-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: antigravity-agent
  namespace: antigravity-system
rules:
  # Read-only access to agents and tasks
  - apiGroups: ["antigravity.io"]
    resources: ["agents", "tasks"]
    verbs: ["get", "list", "watch"]
  
  # Pod introspection
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
  
  # ConfigMap access
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: antigravity-agent
  namespace: antigravity-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: antigravity-agent
subjects:
  - kind: ServiceAccount
    name: antigravity-agent
    namespace: antigravity-system

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: antigravity-agent
  namespace: antigravity-system
