apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: antigravity-system

resources:
  - ../../k8s/crds/agent-crd.yaml
  - ../../k8s/crds/task-crd.yaml
  - ../../k8s/rbac.yaml
  - ../../k8s/database.yaml
  - ../../k8s/deployment.yaml

commonLabels:
  environment: development
  managed-by: kustomize

commonAnnotations:
  kustomize.config.k8s.io/needs-hash: "true"

replicas:
  - name: antigravity-backend
    count: 1
  - name: ollama
    count: 1
  - name: redis
    count: 1

patchesStrategicMerge:
  - |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: antigravity-backend
    spec:
      template:
        spec:
          containers:
          - name: backend
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 250m
                memory: 256Mi

configMapGenerator:
  - name: antigravity-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - ENABLE_PROFILING=true

secretGenerator:
  - name: antigravity-secrets
    behavior: merge
    literals:
      - JWT_SECRET=dev-secret-key-change-in-production
      - POSTGRES_PASSWORD=devpassword

images:
  - name: open-antigravity/backend
    newTag: dev
  - name: open-antigravity/frontend
    newTag: dev
  - name: postgres
    newTag: "15-alpine"
  - name: redis
    newTag: "7-alpine"
  - name: ollama/ollama
    newTag: latest
