apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: antigravity-system
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: 30s
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
        editable: true
        jsonData:
          maxLines: 1000

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: antigravity-system
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'Antigravity Dashboards'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 60
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: antigravity-system
data:
  rules.yaml: |
    groups:
      - name: application.rules
        interval: 30s
        rules:
          - alert: BackendDown
            expr: up{job="antigravity-backend"} == 0
            for: 2m
            labels:
              severity: critical
              component: backend
            annotations:
              summary: "Backend is down"
              description: "Backend pod ({{ $labels.pod }}) has been unavailable for > 2 minutes"

          - alert: HighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
            for: 5m
            labels:
              severity: warning
              component: backend
            annotations:
              summary: "High error rate detected"
              description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

          - alert: SlowResponseTime
            expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
            for: 5m
            labels:
              severity: warning
              component: backend
            annotations:
              summary: "Slow API response times"
              description: "P95 latency is {{ $value }}s on {{ $labels.instance }}"

      - name: database.rules
        interval: 30s
        rules:
          - alert: PostgreSQLDown
            expr: up{job="postgresql"} == 0
            for: 2m
            labels:
              severity: critical
              component: database
            annotations:
              summary: "PostgreSQL is down"
              description: "PostgreSQL instance ({{ $labels.instance }}) is unavailable"

          - alert: PostgreSQLHighConnections
            expr: pg_stat_activity_count > 80
            for: 5m
            labels:
              severity: warning
              component: database
            annotations:
              summary: "High PostgreSQL connection count"
              description: "{{ $value }} connections active, max is 100"

      - name: kubernetes.rules
        interval: 30s
        rules:
          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 5m
            labels:
              severity: critical
              component: cluster
            annotations:
              summary: "Kubernetes node not ready"
              description: "Node {{ $labels.node }} is not in Ready state"

          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total{namespace="antigravity-system"}[15m]) > 0.1
            for: 5m
            labels:
              severity: critical
              component: cluster
            annotations:
              summary: "Pod is crash looping"
              description: "Pod {{ $labels.pod }} restart rate is {{ $value }}"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: antigravity-system
data:
  config.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          continue: true
        - match:
            severity: warning
          receiver: 'warning'
          continue: true

    receivers:
      - name: 'default'
        # Webhook receiver for custom integrations
        webhook_configs:
          - url: 'http://localhost:5001/alerts'
            send_resolved: true

      - name: 'critical'
        # Critical alerts - immediate notification
        webhook_configs:
          - url: 'http://localhost:5001/alerts/critical'
            send_resolved: true
        # Add other critical integrations (PagerDuty, email, etc.)

      - name: 'warning'
        # Warning alerts
        webhook_configs:
          - url: 'http://localhost:5001/alerts/warning'
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'dev', 'instance']
