apiVersion: v1
kind: ConfigMap
metadata:
  name: antigravity-config
  namespace: antigravity-system
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  OLLAMA_ENDPOINT: "http://ollama:11434"
  DEFAULT_MODEL: "mistral"
  MAX_TASK_TIMEOUT: "3600"
  TASK_RETRY_ATTEMPTS: "3"

---
apiVersion: v1
kind: Secret
metadata:
  name: antigravity-secrets
  namespace: antigravity-system
type: Opaque
stringData:
  # JWT secret for authentication
  JWT_SECRET: "your-jwt-secret-change-in-production"
  # Database connection string
  DATABASE_URL: "postgres://antigravity:password@postgres:5432/antigravity"
  # Redis URL
  REDIS_URL: "redis://redis:6379"
  # Optional: API keys for paid models (leave empty if using free Ollama)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: antigravity-backend
  namespace: antigravity-system
  labels:
    app: antigravity
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: antigravity
      component: backend
  template:
    metadata:
      labels:
        app: antigravity
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: antigravity-operator
      containers:
        - name: backend
          image: open-antigravity/backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: antigravity-config
            - secretRef:
                name: antigravity-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: logs
              mountPath: /var/log/antigravity
            - name: cache
              mountPath: /tmp/cache
      volumes:
        - name: logs
          emptyDir: {}
        - name: cache
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - antigravity
                    - key: component
                      operator: In
                      values:
                        - backend
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: antigravity-backend
  namespace: antigravity-system
  labels:
    app: antigravity
    component: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: antigravity
    component: backend
  sessionAffinity: ClientIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: antigravity-system
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: api
              containerPort: 11434
              protocol: TCP
          resources:
            requests:
              cpu: 1000m
              memory: 4Gi
            limits:
              cpu: 2000m
              memory: 8Gi
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          livenessProbe:
            httpGet:
              path: /api/tags
              port: api
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/tags
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: antigravity-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: antigravity-system
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 11434
      targetPort: api
      protocol: TCP
  selector:
    app: ollama
