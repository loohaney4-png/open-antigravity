apiVersion: v1
kind: Secret
metadata:
  name: github-repo-creds
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/ishandutta2007/open-antigravity
  # Use GitHub Personal Access Token for authentication
  password: ${GITHUB_TOKEN}  # Replace with actual token
  username: not_used
  # For SSH:
  # sshPrivateKey: |
  #   -----BEGIN RSA PRIVATE KEY-----
  #   ...
  #   -----END RSA PRIVATE KEY-----

---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-repo-creds
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://gitlab.com/ishandutta2007/open-antigravity
  password: ${GITLAB_TOKEN}
  username: not_used

---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-creds
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: helm
  name: docker
  url: https://registry-1.docker.io/v2
  username: ${DOCKER_USERNAME}
  password: ${DOCKER_PASSWORD}

---
apiVersion: v1
kind: Secret
metadata:
  name: private-helm-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: helm
  name: private-helm
  url: https://charts.example.com
  username: ${HELM_USERNAME}
  password: ${HELM_PASSWORD}
