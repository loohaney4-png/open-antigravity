apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: antigravity-system
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'antigravity'
        environment: 'production'

    # Alertmanager routing
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    # Load rules from files
    rule_files:
      - '/etc/prometheus/rules/*.yml'

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Backend application metrics
      - job_name: 'antigravity-backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - antigravity-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_component]
            action: keep
            regex: backend
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
        metric_path: /metrics
        scrape_interval: 30s
        scrape_timeout: 10s

      # Node Exporter - kubernetes nodes
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - antigravity-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            regex: 'node-exporter'
            action: keep

      # cAdvisor - container metrics
      - job_name: 'kubelet'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
        metric_path: /metrics/cadvisor

      # PostgreSQL metrics (via PG exporter)
      - job_name: 'postgresql'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - antigravity-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: postgres
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: instance
        metric_path: /metrics
        scrape_interval: 30s

      # Redis metrics (via Redis exporter)
      - job_name: 'redis'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - antigravity-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: redis
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: instance
        metric_path: /metrics
        scrape_interval: 30s

      # Ollama model performance
      - job_name: 'ollama'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - antigravity-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: ollama
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: instance
        metric_path: /metrics
        scrape_interval: 30s
